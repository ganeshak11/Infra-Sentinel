name: Installation Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-installation:
    name: Test Installation Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io docker-compose python3-pip
      
      - name: Verify script permissions
        run: |
          ls -la *.sh
          test -x install.sh || exit 1
          test -x quick-install.sh || exit 1
          test -x update.sh || exit 1
          test -x uninstall.sh || exit 1
      
      - name: Test ML model training
        run: |
          cd agent/ml
          pip3 install -r requirements.txt
          python3 train_model.py
          test -f anomaly_model.pkl || exit 1
          test -f scaler.pkl || exit 1
      
      - name: Create test .env file
        run: |
          cp .env.example .env
          sed -i 's/your_email@gmail.com/test@example.com/' .env
          sed -i 's/xxxx xxxx xxxx xxxx/test_password/' .env
          sed -i 's/recipient@gmail.com/alert@example.com/' .env
          sed -i 's/your_gemini_api_key_here/test_key/' .env
      
      - name: Build Docker containers
        run: |
          docker-compose build
      
      - name: Start services
        run: |
          docker-compose up -d
          sleep 30
      
      - name: Check service health
        run: |
          docker-compose ps
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3000 || exit 1
      
      - name: Check logs for errors
        if: always()
        run: |
          docker-compose logs
      
      - name: Cleanup
        if: always()
        run: |
          docker-compose down -v
          docker system prune -af

  test-documentation:
    name: Test Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check documentation files exist
        run: |
          test -f README.md || exit 1
          test -f INSTALL.md || exit 1
          test -f QUICKREF.md || exit 1
          test -f docs/INSTALLATION_FLOW.md || exit 1
          test -f docs/INSTALLATION_SYSTEM.md || exit 1
          test -f docs/PRD.md || exit 1
      
      - name: Check for broken links (basic)
        run: |
          grep -r "http://" *.md docs/*.md || true
          grep -r "https://" *.md docs/*.md || true
      
      - name: Validate markdown syntax
        uses: DavidAnson/markdownlint-cli2-action@v11
        with:
          globs: '*.md,docs/*.md'
        continue-on-error: true

  test-scripts-syntax:
    name: Test Shell Script Syntax
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      
      - name: Check shell scripts
        run: |
          shellcheck install.sh || true
          shellcheck quick-install.sh || true
          shellcheck update.sh || true
          shellcheck uninstall.sh || true
          shellcheck scripts/simulate/*.sh || true
