name: Installation Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-scripts:
    name: Test Scripts and Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Verify script permissions
        run: |
          ls -la *.sh
          test -x install.sh || exit 1
          test -x quick-install.sh || exit 1
          test -x update.sh || exit 1
          test -x uninstall.sh || exit 1
      
      - name: Check documentation files exist
        run: |
          test -f README.md || exit 1
          test -f commands.md || exit 1
          test -f .env.example || exit 1
          test -f docker-compose.yml || exit 1
          test -f docs/PRD.md || exit 1
      
      - name: Verify Docker Compose syntax
        run: |
          docker compose config > /dev/null || echo "Docker Compose config has issues"
        continue-on-error: true
      
      - name: Check shell script syntax
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck install.sh || true
          shellcheck quick-install.sh || true
          shellcheck update.sh || true
          shellcheck uninstall.sh || true
          shellcheck scripts/simulate/*.sh || true
        continue-on-error: true
